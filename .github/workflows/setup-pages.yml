name: Setup GitHub Pages

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Enable GitHub Pages from gh-pages branch
        uses: actions/github-script@v7
        with:
          script: |
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              source: { branch: 'gh-pages', path: '/' },
              build_type: 'legacy',
            };
            try {
              await github.rest.repos.createPagesSite(params);
            } catch (error) {
              if (error.status === 409) {
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  source: { branch: 'gh-pages', path: '/' },
                  build_type: 'legacy',
                });
              } else {
                throw error;
              }
            }

      - name: Show Pages URL
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.info(`Pages URL: ${data.html_url ?? '(pending)'}`);