  <script>const CUSTOMER_ALIASES = {
  รุจ: 'พี่รุจ',
  'ทราย หมาพี': 'ทรายหมาพี',
};

function cleanText(value) {
  return value.trim().replace(/\s+/g, ' ');
}

function normalizeCustomerName(value) {
  const cleaned = cleanText(value);
  return CUSTOMER_ALIASES[cleaned] ?? cleaned;
}

function parseOrderDetails(details) {
  const text = cleanText(details);

  const freeExplicit = text.match(/^(.+?)\s+ฟรี\s+(.+)$/iu);
  if (freeExplicit) {
    return {
      productName: cleanText(freeExplicit[1]),
      price: 0,
      customerName: normalizeCustomerName(freeExplicit[2]),
      isFree: true,
    };
  }

  const priced = text.match(/^(.+?)\s+(\d{1,3})\s*(?:บาท)?\s*(.+)$/iu);
  if (!priced) return null;

  const price = Number(priced[2]);
  let customerPart = cleanText(priced[3]).replace(/^บาท\s*/iu, '');

  if (/^ฟรี\s+/iu.test(customerPart)) {
    customerPart = customerPart.replace(/^ฟรี\s+/iu, '');
    return {
      productName: cleanText(priced[1]),
      price: 0,
      customerName: normalizeCustomerName(customerPart),
      isFree: true,
    };
  }

  return {
    productName: cleanText(priced[1]),
    price,
    customerName: normalizeCustomerName(customerPart),
    isFree: price === 0,
  };
}

function parseOrderLine(line) {
  const orderMatch = line.match(/^(\d+)\s*[.)]\s*(.+)$/u);
  if (!orderMatch) return null;

  const parsed = parseOrderDetails(orderMatch[2]);
  if (!parsed?.customerName || !parsed.productName) return null;

  return {
    orderNumber: Number(orderMatch[1]),
    ...parsed,
    sourceLine: line,
  };
}

function parseSalesText(input, fallbackDate = '') {
  const lines = input.split(/\r?\n/).map((line) => cleanText(line)).filter(Boolean);
  const days = [];
  const looseLines = [];

  let currentDay = null;
  let parsingOtherItems = false;

  for (const line of lines) {
    if (/^\d{1,2}\s*\/\s*\d{1,2}\s*\/\s*\d{2,4}$/u.test(line)) {
      currentDay = {
        date: line.replace(/\s+/g, ''),
        items: [],
        unparsedLines: [],
      };
      days.push(currentDay);
      parsingOtherItems = false;
      continue;
    }

    if (/^อื่น\s*ๆ$/iu.test(line.replace(/\s+/g, ''))) {
      parsingOtherItems = true;
      continue;
    }

    if (parsingOtherItems) {
      if (currentDay) currentDay.unparsedLines.push(line);
      else looseLines.push(line);
      continue;
    }

    const parsed = parseOrderLine(line);
    if (!parsed) {
      if (currentDay) currentDay.unparsedLines.push(line);
      else looseLines.push(line);
      continue;
    }

    if (!currentDay) {
      currentDay = {
        date: fallbackDate,
        items: [],
        unparsedLines: [],
      };
      days.push(currentDay);
    }

    currentDay.items.push({
      orderNumber: parsed.orderNumber,
      productName: parsed.productName,
      price: parsed.price,
      customerName: parsed.customerName,
      isFree: parsed.isFree,
      sourceLine: parsed.sourceLine,
    });
  }

  return { days, looseLines };
}

function summarizeDay(day) {
  const customerMap = new Map();
  let totalRevenue = 0;
  let paidCups = 0;
  let freeCups = 0;

  for (const item of day?.items ?? []) {
    const paidAmount = item.isFree ? 0 : item.price;
    totalRevenue += paidAmount;

    if (item.isFree) freeCups += 1;
    else paidCups += 1;

    const existing = customerMap.get(item.customerName);
    if (existing) {
      existing.paidCups += item.isFree ? 0 : 1;
      existing.freeCups += item.isFree ? 1 : 0;
      existing.totalSpent += paidAmount;
      existing.items.push(item);
    } else {
      customerMap.set(item.customerName, {
        customerName: item.customerName,
        paidCups: item.isFree ? 0 : 1,
        freeCups: item.isFree ? 1 : 0,
        totalSpent: paidAmount,
        items: [item],
      });
    }
  }

  return {
    totalRevenue,
    paidCups,
    freeCups,
    totalItems: paidCups + freeCups,
    uniqueCustomers: customerMap.size,
    customers: Array.from(customerMap.values()),
  };
}

function buildCustomers() {
  const rows = RAW.trim().split('\n').map((line) => {
    const [name, cups] = line.split('\t');
    return { name, cups: Number(cups) };
  });

  return rows.map((row, i) => ({
    name: row.name,
    rank: i + 1,
    cups: row.cups,
    star: i === 0,
    pointsOriginal: row.cups,
    paidCups: 0,
    freeCupsUsed: 0,
    totalOrdered: 0,
    confirmed: false,
    transactions: [],
  }));
}

const customers = buildCustomers();

const STATS = {
  totalCustomers: customers.length,
  totalPoints: customers.reduce((s, c) => s + c.cups, 0),
};

const KPI = {
  sales: 0,
  cups: 0,
  customers: 0,
};

function calcPoints(data) {
  const pointsAdded = data.paidCups;
  const pointsUsed = data.freeCupsUsed * 10;
  const pointsRemaining = data.pointsOriginal + pointsAdded - pointsUsed;
  const progress = ((pointsRemaining % 10) + 10) % 10;
  const reward = Math.floor(Math.max(pointsRemaining, 0) / 10);
  return { pointsAdded, pointsUsed, pointsRemaining, progress, reward };
}

function findCustomer(name, list = customers) {
  const target = name.trim();
  if (!target) return null;

  let found = list.find((c) => c.name === target);
  if (found) return found;

  const lower = target.toLocaleLowerCase('th');
  found = list.find((c) => c.name.toLocaleLowerCase('th') === lower);
  if (found) return found;

  found = list.find((c) => c.name.includes(target) || target.includes(c.name));
  return found ?? null;
}

function formatTxTime(orderNumber) {
  const hour = 8 + Math.floor(orderNumber / 6);
  const minute = (orderNumber * 7) % 60;
  return `${String(Math.min(hour, 20)).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
}

function resetDailySales() {
  for (const customer of customers) {
    customer.paidCups = 0;
    customer.freeCupsUsed = 0;
    customer.totalOrdered = 0;
    customer.transactions = [];
    customer.confirmed = false;
    customer.unknownName = false;
  }
}

function applyDailySales(dayItems) {
  const warnings = [];
  const appliedCustomers = new Set();

  resetDailySales();

  for (const item of dayItems) {
    const customer = findCustomer(item.customerName);
    if (!customer) {
      warnings.push(`ไม่พบลูกค้า "${item.customerName}" (${item.sourceLine})`);
      continue;
    }

    customer.totalOrdered += 1;
    if (item.isFree) {
      customer.freeCupsUsed += 1;
    } else {
      customer.paidCups += 1;
    }

    customer.transactions.push({
      time: formatTxTime(item.orderNumber ?? customer.transactions.length + 1),
      name: item.productName,
      price: item.isFree ? 'ฟรี' : item.price,
      change: item.isFree ? '−10 แต้ว' : '+1 แต้ว',
      type: item.isFree ? 'free' : 'paid',
    });

    customer.transactions.sort((a, b) => a.time.localeCompare(b.time));
    customer.confirmed = true;
    appliedCustomers.add(customer.name);

    const calc = calcPoints(customer);
    customer.cups = calc.pointsRemaining;
  }

  sortCustomersByPoints();
  recalcStats();

  return {
    warnings,
    appliedCount: dayItems.length - warnings.length,
    customerCount: appliedCustomers.size,
  };
}

function sortCustomersByPoints() {
  customers.sort((a, b) => b.cups - a.cups || a.name.localeCompare(b.name, 'th'));
  customers.forEach((customer, index) => {
    customer.rank = index + 1;
    customer.star = index === 0;
  });
}

function recalcStats() {
  STATS.totalCustomers = customers.length;
  STATS.totalPoints = customers.reduce((sum, customer) => sum + customer.cups, 0);
}

function updateKpi(summary) {
  KPI.sales = summary.totalRevenue;
  KPI.cups = summary.totalItems;
  KPI.customers = summary.uniqueCustomers;
}
