<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TB Coffee Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050b16;
  --glass: rgba(10, 24, 52, 0.72);
  --glass-2: rgba(14, 32, 68, 0.55);
  --text: #f2f6ff;
  --muted: #8ba0c4;
  --green: #22c55e;
  --blue: #3b82f6;
  --blue-hot: #2563eb;
  --purple: #a855f7;
  --orange: #f59e0b;
  --red: #ef4444;
  --radius: 16px;
  --radius-sm: 12px;
  --font: 'Noto Sans Thai', system-ui, sans-serif;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(ellipse 90% 55% at 10% -5%, rgba(37, 99, 235, 0.22), transparent 55%),
    radial-gradient(ellipse 70% 45% at 95% 5%, rgba(245, 158, 11, 0.1), transparent 50%),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(20, 50, 110, 0.35), transparent 60%),
    linear-gradient(180deg, #060e1c, #03070f);
}

/* Phone frame – 390px reference */
.phone {
  width: 100%;
  max-width: 390px;
  margin: 0 auto;
  padding: 14px 12px 22px;
  min-height: 100vh;
}

/* Glass card + glow border */
.card {
  position: relative;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border-radius: var(--radius);
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.65), rgba(245, 158, 11, 0.45) 40%, rgba(59, 130, 246, 0.25) 70%, rgba(245, 158, 11, 0.35));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

/* Header */
.top {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 14px;
}

.logo {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  overflow: visible;
  flex-shrink: 0;
  padding: 0;
  line-height: 0;
  border: none;
  background: transparent;
  box-shadow:
    0 0 0 1.5px rgba(249, 115, 22, 0.9),
    0 0 10px rgba(245, 158, 11, 0.65),
    0 0 18px rgba(245, 158, 11, 0.35),
    0 0 26px rgba(59, 130, 246, 0.18);
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  display: block;
  border-radius: 50%;
  transform: scale(0.88);
}

.titles { flex: 1; min-width: 0; }

.titles h1 {
  font-size: 19px;
  font-weight: 800;
  line-height: 1.15;
  background: linear-gradient(90deg, #fde68a, #f59e0b 55%, #fbbf24);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.titles p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.online {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  white-space: nowrap;
}

.online i {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
}

/* KPI */
.kpi {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.kpi-card {
  padding: 11px 10px 8px;
  overflow: hidden;
}

.kpi-card p {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 3px;
}

.kpi-card h2 {
  font-size: 19px;
  font-weight: 800;
  line-height: 1.1;
}

.kpi-card h2 span {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
}

.k-green {
  background: linear-gradient(160deg, rgba(34, 197, 94, 0.16), rgba(10, 24, 52, 0.85));
  border: 1.5px solid rgba(34, 197, 94, 0.55);
  box-shadow: 0 0 18px rgba(34, 197, 94, 0.18), inset 0 1px 0 rgba(34, 197, 94, 0.12);
}
.k-blue {
  background: linear-gradient(160deg, rgba(59, 130, 246, 0.18), rgba(10, 24, 52, 0.85));
  border: 1.5px solid rgba(59, 130, 246, 0.55);
  box-shadow: 0 0 18px rgba(59, 130, 246, 0.18), inset 0 1px 0 rgba(59, 130, 246, 0.12);
}
.k-purple {
  background: linear-gradient(160deg, rgba(168, 85, 247, 0.16), rgba(10, 24, 52, 0.85));
  border: 1.5px solid rgba(168, 85, 247, 0.55);
  box-shadow: 0 0 18px rgba(168, 85, 247, 0.18), inset 0 1px 0 rgba(168, 85, 247, 0.12);
}

.k-green::before, .k-blue::before, .k-purple::before { display: none; }

.k-green h2 { color: var(--green); text-shadow: 0 0 12px rgba(34, 197, 94, 0.35); }
.k-blue h2 { color: #60a5fa; text-shadow: 0 0 12px rgba(59, 130, 246, 0.35); }
.k-purple h2 { color: #c084fc; text-shadow: 0 0 12px rgba(168, 85, 247, 0.35); }

/* Colored section borders */
.border-blue {
  border: 1.5px solid rgba(59, 130, 246, 0.45);
  box-shadow: 0 0 16px rgba(59, 130, 246, 0.12);
}
.border-blue::before { display: none; }

.border-orange {
  border: 1.5px solid rgba(245, 158, 11, 0.55);
  box-shadow: 0 0 16px rgba(245, 158, 11, 0.15);
}
.border-orange::before { display: none; }

.border-mixed::before {
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.5), rgba(245, 158, 11, 0.4), rgba(168, 85, 247, 0.35));
}

.search.card {
  border: 1.5px solid rgba(59, 130, 246, 0.3);
  box-shadow: 0 0 12px rgba(59, 130, 246, 0.08);
}
.search.card::before { display: none; }

.chart {
  display: block;
  width: 100%;
  height: 30px;
  margin-top: 6px;
}

/* Tabs */
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  padding: 4px;
  margin-bottom: 10px;
  background: var(--glass-2);
  border-radius: var(--radius-sm);
  border: 1.5px solid rgba(59, 130, 246, 0.35);
  box-shadow: 0 0 12px rgba(59, 130, 246, 0.08);
}

.tab {
  border: 0;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.tab.active {
  background: linear-gradient(135deg, var(--blue-hot), #1d4ed8);
  color: #fff;
  box-shadow: 0 4px 16px rgba(37, 99, 235, 0.45);
}

/* Search */
.search {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 11px 13px;
  margin-bottom: 10px;
  color: var(--muted);
}

.search input {
  flex: 1;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
  font: inherit;
  font-size: 15px;
}

.search input::placeholder { color: var(--muted); }

/* Split layout – like Image.png */
.split {
  display: grid;
  grid-template-columns: 0.92fr 1.08fr;
  gap: 8px;
  margin-bottom: 10px;
  align-items: start;
}

.list {
  padding: 10px 8px;
  min-height: 340px;
  display: flex;
  flex-direction: column;
}

.list-scroll {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 5px;
  max-height: 300px;
  scrollbar-width: thin;
}

.list-scroll.expanded {
  max-height: min(52vh, 420px);
}

.customer-item {
  display: grid;
  grid-template-columns: 16px 14px 1fr auto;
  align-items: center;
  gap: 5px;
  width: 100%;
  border: 1px solid rgba(255, 255, 255, 0.04);
  background: var(--glass-2);
  border-radius: 10px;
  padding: 8px 7px;
  color: inherit;
  font: inherit;
  text-align: left;
  cursor: pointer;
}

.customer-item .rank {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
}

.customer-item .star { color: var(--orange); font-size: 11px; }
.customer-item .star.ghost { opacity: 0; }

.customer-item .name {
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.customer-item .pts {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

.customer-item.active {
  border: 1.5px solid rgba(59, 130, 246, 0.7);
  background: rgba(37, 99, 235, 0.22);
  box-shadow: 0 0 16px rgba(59, 130, 246, 0.28);
}

.customer-item.active .pts { color: #93c5fd; font-weight: 700; }

.detail-wrap {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}

.detail {
  padding: 11px 10px;
}

.detail-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 9px;
}

.detail-top h2 {
  font-size: 16px;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 4px;
}

.detail-top .star { color: var(--orange); font-size: 13px; }

.detail-pts {
  font-size: 20px;
  font-weight: 800;
  color: var(--orange);
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
}

.detail-pts span {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
}

.reward {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 10px;
  margin-bottom: 9px;
  border-radius: var(--radius-sm);
  background: rgba(245, 158, 11, 0.12);
  border: 1px solid rgba(245, 158, 11, 0.35);
  box-shadow: 0 0 16px rgba(245, 158, 11, 0.12);
}

.reward-ico {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: rgba(245, 158, 11, 0.2);
  color: var(--orange);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.reward strong {
  display: block;
  font-size: 12px;
  color: var(--orange);
}

.reward span {
  font-size: 10px;
  color: var(--muted);
}

.progress-wrap label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
}

.cups {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.cup-dot {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  display: grid;
  place-items: center;
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 255, 255, 0.2);
}

.cup-dot.on {
  background: rgba(245, 158, 11, 0.25);
  color: var(--orange);
  box-shadow: 0 0 8px rgba(245, 158, 11, 0.25);
}

.prog-count {
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  margin-top: 5px;
}

.tx-block h3 {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  margin: 9px 0 6px;
}

.tx-row {
  display: grid;
  grid-template-columns: 36px 1fr 30px 58px;
  gap: 4px;
  align-items: center;
  font-size: 12px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.tx-row:last-of-type { border-bottom: 0; }

.tx-time { color: var(--muted); font-size: 10px; }
.tx-name { font-weight: 600; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-price { color: var(--muted); text-align: right; font-size: 10px; }
.tx-pts { font-weight: 700; text-align: right; font-size: 10px; }
.tx-row.paid .tx-pts { color: var(--green); }
.tx-row.free .tx-pts { color: var(--red); }

.empty-tx {
  font-size: 12px;
  color: var(--muted);
  padding: 6px 0;
}

.link-btn {
  border: 0;
  background: none;
  color: var(--blue);
  font: inherit;
  font-size: 11px;
  cursor: pointer;
  margin-top: 6px;
}

.link-btn.center {
  display: block;
  width: 100%;
  text-align: center;
  margin-top: 8px;
}

/* Formula */
.formula-card {
  padding: 14px 12px;
  margin-bottom: 10px;
  background: linear-gradient(160deg, rgba(37, 99, 235, 0.2), rgba(10, 24, 52, 0.9));
  border: 1.5px solid rgba(59, 130, 246, 0.55);
  box-shadow: 0 0 20px rgba(59, 130, 246, 0.2), inset 0 1px 0 rgba(147, 197, 253, 0.1);
}

.formula-card::before { display: none; }

.formula-head {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
  color: #93c5fd;
  margin-bottom: 10px;
}

.formula-ico {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(59, 130, 246, 0.25);
  border: 1px solid rgba(59, 130, 246, 0.4);
  display: grid;
  place-items: center;
  color: #93c5fd;
  flex-shrink: 0;
}

.formula-rule {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.5;
  margin-top: 8px;
  text-align: center;
}

.formula-eq {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.formula-eq.big {
  padding: 8px 0 4px;
}

.formula-eq em {
  font-style: normal;
  font-size: 22px;
  font-weight: 800;
}

.formula-eq i {
  font-style: normal;
  color: var(--muted);
  font-weight: 700;
  font-size: 14px;
}

.c-green { color: var(--green); }
.c-orange { color: var(--orange); }
.c-red { color: var(--red); }
.c-blue { color: #60a5fa; }

.formula-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-top: 10px;
}

.formula-grid div {
  text-align: center;
  padding: 8px 4px;
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.22);
  border: 1px solid rgba(59, 130, 246, 0.15);
}

.formula-grid small {
  display: block;
  font-size: 9px;
  color: var(--muted);
  line-height: 1.3;
  margin-bottom: 3px;
}

.formula-grid strong { font-size: 14px; }

/* Sales tab */
.sales-tab {
  padding: 12px 10px;
  min-height: 200px;
}

.sales-tab h3 {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.sales-total {
  font-size: 24px;
  font-weight: 800;
  color: var(--green);
  margin-bottom: 10px;
}

.sales-total span {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}

/* Paste */
.paste {
  margin-bottom: 10px;
  overflow: hidden;
}

.paste-head {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 13px;
  border: 0;
  background: linear-gradient(135deg, rgba(217, 119, 6, 0.35), rgba(245, 158, 11, 0.22));
  color: inherit;
  font: inherit;
  text-align: left;
  cursor: pointer;
}

.paste-ico {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(245, 158, 11, 0.22);
  color: var(--orange);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.paste-head strong {
  display: block;
  font-size: 14px;
  color: #fde68a;
}

.paste-head small {
  display: block;
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

.paste .arrow {
  margin-left: auto;
  font-size: 22px;
  color: var(--orange);
  transition: transform 0.2s;
}

.paste.open .arrow { transform: rotate(90deg); }

.paste-body {
  display: none;
  padding: 0 13px 13px;
}

.paste.open .paste-body { display: block; }

.paste-body textarea {
  width: 100%;
  min-height: 80px;
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(59, 130, 246, 0.25);
  background: rgba(0, 0, 0, 0.25);
  color: var(--text);
  font: inherit;
  font-size: 13px;
  resize: vertical;
  outline: none;
}

.paste-msg {
  margin: 8px 0 0;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
  line-height: 1.4;
}

.paste-msg.ok {
  color: #86efac;
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.25);
}

.paste-msg.err {
  color: #fca5a5;
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.25);
}

.btn-confirm {
  display: block;
  width: 100%;
  margin-top: 9px;
  padding: 11px;
  border: 0;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--blue-hot), var(--blue));
  color: #fff;
  font: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4);
}

/* Footer */
.foot {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 12px 8px;
  text-align: center;
}

.foot span { font-size: 16px; display: block; margin-bottom: 3px; }

.foot small {
  display: block;
  font-size: 9px;
  color: var(--muted);
  line-height: 1.25;
}

.foot b {
  display: block;
  font-size: 11px;
  margin-top: 2px;
  line-height: 1.3;
}

/* Wider screens – still phone-first proportions */
@media (min-width: 391px) {
  .phone {
    padding-top: 18px;
    padding-bottom: 28px;
  }
}
</style>
</head>
<body>
  <div id="app"></div>
  <script>TRUNCATED_PLACEHOLDER</script>
</body>
</html>
